version: "3.8"
services:
  manipulation-api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - SQLITE_URL=sqlite:////app/manipulation.db
    volumes:
      - manipulation-data:/app
    command: uvicorn manipulation.main:app --host 0.0.0.0 --port 8000

  manipulation-dashboard:
    build: .
    ports:
      - "8501:8501"
    environment:
      - SQLITE_URL=sqlite:////app/manipulation.db
    volumes:
      - manipulation-data:/app
    command: streamlit run manipulation/dashboard.py --server.port 8501 --server.address 0.0.0.0

volumes:
  manipulation-data:
