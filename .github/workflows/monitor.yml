name: S.E.N.T.R.Y Monitor Pipeline

on:
  schedule:
    # Run every 10 minutes
    - cron: '*/10 * * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Allow workflow to commit and push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements-actions.txt

      - name: Restore anomaly model artifacts
        if: ${{ env.ANOMALY_USE_MODEL == 'true' }}
        env:
          ANOMALY_USE_MODEL: ${{ secrets.ANOMALY_USE_MODEL || 'false' }}
          ANOMALY_MODEL_URL: ${{ secrets.ANOMALY_MODEL_URL }}
          ANOMALY_SCALER_URL: ${{ secrets.ANOMALY_SCALER_URL }}
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p Backend/data

          if [ -z "$ANOMALY_MODEL_URL" ] || [ -z "$ANOMALY_SCALER_URL" ]; then
            echo "ANOMALY_USE_MODEL is true but artifact URLs are missing."
            exit 1
          fi

          download_asset() {
            local url="$1"
            local dest="$2"
            echo "Downloading $dest"
            curl -fLsS --retry 3 \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/octet-stream" \
              "$url" -o "$dest"
          }

          validate_binary_asset() {
            local path="$1"
            if [ ! -s "$path" ]; then
              echo "Artifact $path is missing or empty"
              return 1
            fi
            local header
            header=$(head -c 256 "$path" | tr '\n' ' ' | tr '\r' ' ')
            case "$header" in
              *"<!DOCTYPE"*|*"<html"*|*"Not Found"*|*"git-lfs.github.com/spec"*)
                echo "Artifact $path looks like HTML/LFS text, not a binary model file"
                return 1
                ;;
            esac
            return 0
          }

          download_asset "$ANOMALY_MODEL_URL" "Backend/data/saved_model.pth"
          download_asset "$ANOMALY_SCALER_URL" "Backend/data/scaler.pkl"

          validate_binary_asset "Backend/data/saved_model.pth"
          validate_binary_asset "Backend/data/scaler.pkl"

          ls -lh Backend/data || true
          sha256sum Backend/data/saved_model.pth Backend/data/scaler.pkl

      - name: Validate anomaly artifacts
        if: ${{ env.ANOMALY_USE_MODEL == 'true' }}
        run: |
          python - <<'PY'
          import pickle
          import sys
          import torch
          import numpy.core as numpy_core

          sys.modules.setdefault("numpy._core", numpy_core)

          checkpoint = torch.load("Backend/data/saved_model.pth", map_location="cpu")
          if not isinstance(checkpoint, dict) or "model_state_dict" not in checkpoint:
            raise RuntimeError("Invalid model checkpoint format")

          with open("Backend/data/scaler.pkl", "rb") as f:
            scaler = pickle.load(f)

          if not hasattr(scaler, "transform"):
            raise RuntimeError("Loaded scaler does not expose transform()")

          print("Anomaly artifacts validated successfully")
          PY

      - name: Run monitoring pipeline
        env:
          # Data source configuration
          USE_REAL_DATA: ${{ secrets.USE_REAL_DATA || 'false' }}
          ANOMALY_USE_MODEL: ${{ secrets.ANOMALY_USE_MODEL || 'false' }}
          
          # Real data APIs
          ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
          TARGET_WALLET_ADDRESS: ${{ secrets.TARGET_WALLET_ADDRESS }}
          
          # Email notifications
          SENTRY_EMAIL_PROVIDER: ${{ secrets.SENTRY_EMAIL_PROVIDER }}
          SENTRY_SMTP_HOST: ${{ secrets.SENTRY_SMTP_HOST }}
          SENTRY_SMTP_PORT: ${{ secrets.SENTRY_SMTP_PORT }}
          SENTRY_SMTP_USER: ${{ secrets.SENTRY_SMTP_USER }}
          SENTRY_SMTP_PASSWORD: ${{ secrets.SENTRY_SMTP_PASSWORD }}
          SENTRY_SENDGRID_API_KEY: ${{ secrets.SENTRY_SENDGRID_API_KEY }}
          SENTRY_EMAIL_FROM: ${{ secrets.SENTRY_EMAIL_FROM }}
          SENTRY_EMAIL_TO: ${{ secrets.SENTRY_EMAIL_TO }}
          
          # Webhook notifications
          SENTRY_WEBHOOK_URL: ${{ secrets.SENTRY_WEBHOOK_URL }}
        run: |
          python scripts/run_monitor.py \
            --output-dir Frontend/public/data \
            --state-dir state \
            ${{ secrets.USE_REAL_DATA == 'true' && '--use-real-data' || '' }}

      - name: Configure git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Commit and push results
        run: |
          git add Frontend/public/data/*.json state/already_alerted.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update SEnTRY alerts and scores" && git push)
